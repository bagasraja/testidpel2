<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap & Upload Foto Meteran PLN</title>
    
    <!-- Pannellum 360 Viewer Library -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 15px; background-color: #f4f6f9; color: #333; }
        .header { background: #0056b3; color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .header h2 { margin: 0 0 5px 0; font-size: 20px; }
        .header p { margin: 0; font-size: 13px; opacity: 0.9; }
        
        .control-panel { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .control-panel input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; }
        #searchInput { flex-grow: 1; min-width: 200px; }
        #adminPin { width: 150px; background-color: #fff3cd; border-color: #ffeeba; }
        
        .table-card { background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); overflow: hidden; }
        .table-container { overflow-x: auto; max-height: 70vh; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        th { background-color: #004085; color: white; padding: 12px 10px; position: sticky; top: 0; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover { background-color: #f1f5f9; }
        
        .action-cell { display: flex; gap: 8px; align-items: center; }
        .drop-zone { border: 2px dashed #0056b3; border-radius: 6px; padding: 10px; text-align: center; background: #f8fbff; transition: 0.2s; position: relative; min-width: 130px; }
        .drop-zone.dragover { background: #cce5ff; border-color: #004085; transform: scale(1.02); }
        .drop-text { font-size: 10px; color: #555; display: block; margin-bottom: 5px; pointer-events: none; }
        
        .upload-btn-wrapper { position: relative; display: inline-block; }
        .btn-upload { background-color: #28a745; color: white; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; }
        .upload-btn-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        
        .btn-view360 { background-color: #17a2b8; color: white; padding: 8px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; }
        .btn-view360:hover { background-color: #138496; }
        .btn-view360:disabled { background-color: #ccc; cursor: not-allowed; }
        .loading-text { font-size: 11px; color: #ff9800; font-weight: bold; }

        /* Modal Viewer 360 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { width: 95%; height: 90%; background: #000; position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        #panorama { width: 100%; height: 100%; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 20px; font-weight: bold; cursor: pointer; z-index: 1010; background: rgba(255,0,0,0.7); padding: 5px 15px; border-radius: 5px; border: 1px solid white; }
        .close-btn:hover { background: red; }
    </style>
</head>
<body>

    <div class="header">
        <h2>⚡ Rekap & Upload Foto 360 ke Google Drive</h2>
        <p id="totalInfo">Sinkronisasi Database... Mohon tunggu.</p>
    </div>

    <div class="control-panel">
        <input type="text" id="searchInput" placeholder="🔍 Cari IDPel, Nama, atau Alamat..." onkeyup="filterData()">
        <input type="password" id="adminPin" placeholder="🔑 PIN Upload">
    </div>

    <div class="table-card">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>ID Pelanggan</th>
                        <th>Nama Pelanggan</th>
                        <th>Alamat</th>
                        <th>Aksi / Upload Foto</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Pop-up 360 Viewer -->
    <div id="viewerModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeViewer()">TUTUP X</button>
            <div id="panorama"></div>
        </div>
    </div>

    <!-- PapaParse Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // ================= PENGATURAN =================
        // 1. URL Apps Script (Backend Upload)
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHOcgLckW1vKyMdarEuVbZjMua_5jy6OnHjEDfcl8zfb8_jLO0B2EwibTv16sdOpVy/exec";
        
        // 2. ID Spreadsheet Google Sheets (Database Foto)
        const SPREADSHEET_ID = "https://script.google.com/macros/s/AKfycbxHOcgLckW1vKyMdarEuVbZjMua_5jy6OnHjEDfcl8zfb8_jLO0B2EwibTv16sdOpVy/exec"; 
        // ==============================================

        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;
        let allData = [];
        let photoDatabase = {}; // Menyimpan IDPel -> ID File Google Drive
        let panViewer = null; // Variabel untuk player Pannellum

        // PROSES 1: Ambil data foto dari Google Sheets dulu
        if(SPREADSHEET_ID !== "MASUKKAN_ID_SPREADSHEET_DISINI") {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: false, // Karena dari script tadi tidak pakai header
                complete: function(results) {
                    results.data.forEach(row => {
                        // row[0] adalah IDPel, row[2] adalah File ID dari Google Drive
                        if(row[0] && row[2]) {
                            photoDatabase[row[0].toString().trim()] = row[2].trim();
                        }
                    });
                    loadDataPelanggan(); // Lanjut ambil data pelanggan
                },
                error: function() {
                    console.warn("Gagal membaca Google Sheets. Pastikan aksesnya Siapa Saja (Viewer).");
                    loadDataPelanggan();
                }
            });
        } else {
            loadDataPelanggan();
        }

        // PROSES 2: Ambil data pelanggan dari CSV statis
        function loadDataPelanggan() {
            Papa.parse("rekap_data_pelanggan.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allData = results.data;
                    document.getElementById("totalInfo").innerText = `Total Pelanggan: ${allData.length} data | Database Tersinkronisasi ✅`;
                    renderTable(allData);
                }
            });
        }

        // Tampilkan Tabel
        function renderTable(data) {
            const body = document.getElementById("tableBody");
            body.innerHTML = "";

            data.forEach((row, index) => {
                const idpel = row['ID Pelanggan'] ? row['ID Pelanggan'].trim() : `row_${index}`;
                
                // Cek apakah IDPel ini ada di Database Google Sheets kita
                const hasPhoto = photoDatabase[idpel] ? true : false;
                
                // Jika punya foto, tombol aktif. Jika belum, tombol abu-abu.
                const btnView = hasPhoto 
                    ? `<button class="btn-view360" onclick="open360('${idpel}')">👁️ Lihat 360</button>`
                    : `<button class="btn-view360" disabled title="Foto belum diupload">❌ Belum Ada Foto</button>`;

                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td><b>${row['ID Pelanggan'] || '-'}</b></td>
                    <td>${row['Nama Pelanggan'] || '-'}</td>
                    <td>${row['Alamat Pelanggan'] || '-'}</td>
                    <td id="cell_${idpel}">
                        <div class="action-cell">
                            <div class="drop-zone" id="drop_${idpel}" 
                                 ondragover="handleDragOver(event, this)" 
                                 ondragleave="handleDragLeave(event, this)" 
                                 ondrop="handleDrop(event, this, '${idpel}', '${row['Nama Pelanggan'] || ''}')">
                                 <span class="drop-text">Seret Foto<br>atau</span>
                                 <div class="upload-btn-wrapper">
                                     <button class="btn-upload">Upload</button>
                                     <input type="file" accept="image/*" onchange="processFile(this.files[0], '${idpel}', '${row['Nama Pelanggan'] || ''}')">
                                 </div>
                            </div>
                            ${btnView}
                        </div>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        // --- FUNGSI VIEWER 360 (PANNELLUM) ---
        function open360(idpel) {
            const fileId = photoDatabase[idpel];
            if(!fileId) return;

            document.getElementById('viewerModal').style.display = 'flex';

            // Menggunakan Proxy untuk menghindari blokir CORS Google Drive saat render WebGL (360)
            const gdriveUrl = `https://drive.google.com/uc?export=view&id=${fileId}`;
            const corsProxyUrl = `https://corsproxy.io/?${encodeURIComponent(gdriveUrl)}`;

            // Bersihkan viewer lama jika ada
            if(panViewer) { panViewer.destroy(); }

            // Nyalakan Pannellum
            panViewer = pannellum.viewer('panorama', {
                "type": "equirectangular",
                "panorama": corsProxyUrl,
                "autoLoad": true,
                "compass": true
            });
        }

        function closeViewer() {
            document.getElementById('viewerModal').style.display = 'none';
            if(panViewer) {
                panViewer.destroy();
                panViewer = null;
            }
        }

        // --- FUNGSI UPLOAD DRAG & DROP ---
        function handleDragOver(e, element) { e.preventDefault(); element.classList.add('dragover'); }
        function handleDragLeave(e, element) { e.preventDefault(); element.classList.remove('dragover'); }
        function handleDrop(e, element, idpel, nama) {
            e.preventDefault(); element.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0], idpel, nama);
        }

        function processFile(file, idpel, nama) {
            if (!file) return;
            const pinAdmin = document.getElementById('adminPin').value;
            if(pinAdmin === "") { alert("Masukkan PIN Upload di kolom kuning atas terlebih dahulu!"); return; }

            const cell = document.getElementById(`cell_${idpel}`);
            cell.innerHTML = `<span class="loading-text">⏳ Mengunggah... (Tunggu ya)</span>`;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; 
                    let scale = 1;
                    if(img.width > MAX_WIDTH) { scale = MAX_WIDTH / img.width; }
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64Data = canvas.toDataURL('image/jpeg', 0.8);
                    const cleanName = nama.replace(/[^a-zA-Z0-9]/g, "_");
                    
                    const iframeName = "iframe_" + idpel;
                    let iframe = document.createElement("iframe");
                    iframe.name = iframeName; iframe.style.display = "none";
                    document.body.appendChild(iframe);

                    let form = document.createElement("form");
                    form.method = "POST"; form.action = APPS_SCRIPT_URL;
                    form.target = iframeName; form.style.display = "none";

                    let inputName = document.createElement("input");
                    inputName.type = "hidden"; inputName.name = "filename"; inputName.value = `${idpel}_${cleanName}.jpg`;

                    let inputBase64 = document.createElement("input");
                    inputBase64.type = "hidden"; inputBase64.name = "base64"; inputBase64.value = base64Data;

                    let inputPassword = document.createElement("input");
                    inputPassword.type = "hidden"; inputPassword.name = "password"; inputPassword.value = pinAdmin;

                    form.appendChild(inputName); form.appendChild(inputBase64); form.appendChild(inputPassword);
                    document.body.appendChild(form);

                    iframe.onload = function() {
                        cell.innerHTML = `<span style="color:green; font-weight:bold; font-size:12px;">✅ Terkirim. Refresh web!</span>`;
                        setTimeout(() => { document.body.removeChild(form); document.body.removeChild(iframe); }, 2000);
                    };
                    form.submit();
                };
            };
            reader.readAsDataURL(file);
        }

        // Pencarian Data
        function filterData() {
            const keyword = document.getElementById("searchInput").value.toLowerCase();
            const filtered = allData.filter(row => {
                return ((row['ID Pelanggan'] && row['ID Pelanggan'].toLowerCase().includes(keyword)) ||
                        (row['Nama Pelanggan'] && row['Nama Pelanggan'].toLowerCase().includes(keyword)));
            });
            renderTable(filtered);
        }
    </script>
</body>
</html>
